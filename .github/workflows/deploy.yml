# GitHub Actions Workflow pentru deploy pe GitHub Pages
# Acest fișier configurează deploy automat pe GitHub Pages

name: Deploy to GitHub Pages

on:
  # Trigger la push pe branch-ul main
  push:
    branches: ['main']
  
  # Permite rulare manuală din tab-ul Actions
  workflow_dispatch:

# Setează GITHUB_TOKEN pentru permisiuni
permissions:
  contents: read
  pages: write
  id-token: write

# Permite doar un singur deploy concurrent
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Job de build
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload din folderul out (generat de next build cu output: 'export')
          path: './out'

  # Job de deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
